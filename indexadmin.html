<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - EduLearn TKA SMP</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script type="importmap">
    {
      "imports": {
        "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
      }
    }
    </script>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
        }

        .admin-login-section {
            max-width: 420px;
            width: 100%;
            margin: 2rem;
            background: white;
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
        }

        .admin-login-section h1 {
            text-align: center;
            color: #1f2937;
            margin-bottom: 0.5rem;
            font-size: 1.75rem;
        }

        .admin-login-section .subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .admin-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #374151;
            font-size: 0.9rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i.prefix {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 1rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 2.75rem;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            font-size: 1rem;
            transition: color 0.3s;
        }

        .toggle-password:hover {
            color: #667eea;
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .security-note {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #f0f9ff;
            border-radius: 12px;
            border-left: 4px solid #3b82f6;
        }

        .security-note h4 {
            color: #1e40af;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .security-note p {
            color: #6b7280;
            font-size: 0.8rem;
            margin: 0;
            line-height: 1.5;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: #6b7280;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .back-link a:hover {
            color: #667eea;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .shake {
            animation: shake 0.3s ease;
        }
    </style>
</head>
<body>
    <!-- Admin Login Section -->
    <div id="adminLoginSection" class="admin-login-section">
        <div class="admin-badge">
            <i class="fas fa-shield-alt"></i>
            <span>Secure Admin Access</span>
        </div>
        
        <h1><i class="fas fa-user-shield"></i> Admin Login</h1>
        <p class="subtitle">Masuk ke panel administrasi EduLearn TKA</p>

        <form id="adminLoginForm">
            <div class="form-group">
                <label for="adminUsername">Email atau Username</label>
                <div class="input-wrapper">
                    <i class="fas fa-user prefix"></i>
                    <input type="text" id="adminUsername" placeholder="Masukkan email atau username" required autocomplete="username">
                </div>
                <small style="color: #6b7280; font-size: 0.75rem; margin-top: 0.25rem; display: block;">
                    <i class="fas fa-info-circle"></i> Contoh: admin@example.com atau admin
                </small>
            </div>

            <div class="form-group">
                <label for="adminPassword">Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock prefix"></i>
                    <input type="password" id="adminPassword" placeholder="Masukkan password" required autocomplete="current-password">
                    <i class="fas fa-eye toggle-password" id="toggleAdminPassword"></i>
                </div>
            </div>

            <button type="submit" class="btn-submit">
                <i class="fas fa-sign-in-alt"></i>
                <span>Masuk ke Admin Panel</span>
            </button>
        </form>

        <div class="security-note">
            <h4><i class="fas fa-info-circle"></i> Keamanan</h4>
            <p>Area ini dilindungi dengan autentikasi Supabase. 
               Hanya pengguna dengan hak admin yang dapat mengakses panel ini.
               Semua aktivitas dicatat untuk audit.</p>
        </div>

        <div class="back-link">
            <a href="index.html"><i class="fas fa-arrow-left"></i> Kembali ke Halaman Utama</a>
        </div>
    </div>

    <!-- Admin Dashboard (hidden by default) -->
    <div id="adminDashboard" style="display: none;"></div>

    <script type="module" src="admin.js"></script>
</body>
</html>
